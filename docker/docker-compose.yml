name: mutils
services:
  postgres:
    image: postgres:17-alpine
    container_name: mutils-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mutils}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mutils_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mutils}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01-init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mutils} -d ${POSTGRES_DB:-mutils}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mutils-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: mutils-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-mutils-assets}
      BUCKET_USER_DATA: ${MINIO_BUCKET_USER_DATA:-mutils-user-data}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://$$MINIO_ENDPOINT:$$MINIO_PORT $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      mc mb myminio/$$BUCKET_ASSETS --ignore-existing;
      mc mb myminio/$$BUCKET_USER_DATA --ignore-existing;
      mc anonymous set download myminio/$$BUCKET_ASSETS;
      mc anonymous set none myminio/$$BUCKET_USER_DATA;
      echo 'Buckets created and policies set';
      "

  adminer:
    image: adminer:latest
    depends_on:
      - postgres
    ports:
      - 8080:8080

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
